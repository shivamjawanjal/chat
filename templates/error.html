<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error — BT Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b0f1a;--panel:#111827;--border:rgba(255,255,255,.07);--accent:#38bdf8;--text:#e2e8f0;--muted:#475569;--danger:#f87171;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:48px 40px;text-align:center;max-width:440px;width:100%;}
    .code{font-family:'Space Mono',monospace;font-size:72px;font-weight:700;background:linear-gradient(135deg,#f87171,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
    h1{font-size:20px;font-weight:600;margin:16px 0 8px;}
    p{font-size:14px;color:var(--muted);line-height:1.6;}
    a{display:inline-flex;align-items:center;margin-top:28px;padding:12px 24px;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:opacity .18s;}
    a:hover{opacity:.85;}
  </style>
</head>
<body>
  <div class="card">
    <div class="code">{{ error_code | default('500') }}</div>
    <h1>{{ error_title | default('Something went wrong') }}</h1>
    <p>{{ error_message | default('An unexpected error occurred. Please try again later.') }}</p>
    <a href="/">← Go back home</a>
  </div>
</body>
</html>
